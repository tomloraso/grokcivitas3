<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civitas</title>
    <script>
      // Apply persisted theme before first paint to prevent FOUC.
      (function(){
        var STORAGE_KEY = "civitas.theme.mode";
        var mode = "system";
        try { mode = localStorage.getItem(STORAGE_KEY) || "system"; } catch(e) {}
        var resolved;
        if (mode === "dark") resolved = "dark";
        else if (mode === "light") resolved = "light";
        else resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", resolved);
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
